<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightStream | Tech Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-enter {
            animation: cardEnter 0.4s ease-out forwards;
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-exit {
            animation: cardExit 0.3s ease-in forwards;
        }
        @keyframes cardExit {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(8px); }
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <nav class="border-b border-slate-800 bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">Insight<span class="text-blue-500">Stream</span></h1>
            </div>
            <button onclick="syncData()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-semibold transition-all flex items-center gap-2 shadow-lg shadow-blue-500/20">
                <i class="fas fa-sync-alt" id="sync-icon"></i> Sync News
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <section class="max-w-4xl mx-auto mb-16">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold text-white mb-2">Technical Intelligence Feed</h2>
                <p class="text-slate-400">Ask our AI to analyze the latest engineering updates.</p>
            </div>

            <div class="bg-slate-800/40 border border-slate-700 p-2 rounded-2xl shadow-2xl focus-within:border-blue-500/50 transition-all flex items-center">
                <div class="pl-4 pr-2 text-blue-500">
                    <i class="fas fa-robot text-xl"></i>
                </div>
                <input type="text" id="ai-query" 
                       class="flex-1 bg-transparent border-none py-4 px-2 text-white placeholder-slate-500 focus:ring-0 outline-none text-lg" 
                       placeholder="Ask Mistral: 'Summarize the latest Microsoft AI updates'...">
                <button onclick="askAI()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl transition-all flex items-center gap-2">
                    <span>Analyze</span>
                    <i class="fas fa-sparkles text-xs"></i>
                </button>
            </div>

            <div id="ai-response-box" class="hidden mt-6 fade-in">
                <div class="bg-blue-600/5 border border-blue-500/20 p-8 rounded-2xl backdrop-blur-sm">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                        <h4 class="text-blue-400 text-xs font-black uppercase tracking-widest">Neural Analysis Summary</h4>
                    </div>
                    <p id="ai-answer-text" class="text-slate-200 text-lg leading-relaxed italic"></p>
                </div>
            </div>
        </section>

        <!-- News count indicator -->
        <div class="flex justify-between items-center mb-6">
            <p id="news-count" class="text-slate-500 text-sm"></p>
        </div>

        <!-- News grid -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-slate-800/50 rounded-2xl h-64"></div>
            <div class="animate-pulse bg-slate-800/50 rounded-2xl h-64"></div>
            <div class="animate-pulse bg-slate-800/50 rounded-2xl h-64"></div>
        </div>

        <!-- Show More / Show Less buttons -->
        <div id="pagination-controls" class="hidden mt-10 flex flex-col items-center gap-3">
            <button id="show-more-btn" onclick="showMore()"
                class="hidden bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-blue-500/50 text-white px-8 py-3 rounded-full text-sm font-semibold transition-all flex items-center gap-2">
                <i class="fas fa-chevron-down text-blue-400"></i>
                Show More
            </button>
            <button id="show-less-btn" onclick="showLess()"
                class="hidden bg-slate-800/50 hover:bg-slate-700 border border-slate-700/50 text-slate-400 hover:text-white px-8 py-3 rounded-full text-sm font-semibold transition-all flex items-center gap-2">
                <i class="fas fa-chevron-up text-slate-500"></i>
                Show Less
            </button>
        </div>
    </main>

    <script>
        const CARDS_PER_ROW = 3;   // 3 columns in the grid
        const ROWS_PER_PAGE = 2;   // show 2 rows at a time
        const CARDS_PER_PAGE = CARDS_PER_ROW * ROWS_PER_PAGE; // = 6

        let allArticles = [];      // full dataset from API
        let visibleCount = CARDS_PER_PAGE; // how many cards are currently shown

        // 1. FETCH NEWS (INITIAL LOAD)
        async function loadNews() {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                allArticles = data;
                visibleCount = CARDS_PER_PAGE;
                renderNews();
            } catch (error) {
                console.error("Failed to load news:", error);
            }
        }

        // 2. RENDER only the visible slice of allArticles
        function renderNews() {
            const grid = document.getElementById('news-grid');
            const countEl = document.getElementById('news-count');
            const controls = document.getElementById('pagination-controls');
            const showMoreBtn = document.getElementById('show-more-btn');
            const showLessBtn = document.getElementById('show-less-btn');

            const slice = allArticles.slice(0, visibleCount);

            grid.innerHTML = '';
            slice.forEach((article, index) => {
                const card = document.createElement('div');
                card.className = 'bg-slate-800/40 border border-slate-700/50 p-6 rounded-2xl hover:border-blue-500/50 transition-all duration-300 hover:-translate-y-1 group card-enter';
                card.style.animationDelay = `${index * 40}ms`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] uppercase tracking-widest font-bold text-blue-400 bg-blue-400/10 px-2 py-1 rounded">${article.source}</span>
                        <div class="flex items-center gap-1 text-amber-400 font-bold">
                            <i class="fas fa-fire-alt text-xs"></i>
                            <span>${article.impact_score}</span>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-3 leading-snug group-hover:text-blue-400 transition-colors">
                        ${article.title}
                    </h3>
                    <p class="text-slate-400 text-sm line-clamp-3 mb-6">${article.summary}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-500">${new Date(article.published).toLocaleDateString()}</span>
                        <a href="${article.link}" target="_blank" class="text-blue-500 hover:text-blue-400 text-sm font-bold flex items-center gap-1">
                            Source <i class="fas fa-arrow-right text-[10px]"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Update count label
            countEl.textContent = `Showing ${slice.length} of ${allArticles.length} articles`;

            // Show/hide pagination controls
            const hasMore = visibleCount < allArticles.length;
            const hasLess = visibleCount > CARDS_PER_PAGE;

            controls.classList.toggle('hidden', !hasMore && !hasLess);
            showMoreBtn.classList.toggle('hidden', !hasMore);
            showLessBtn.classList.toggle('hidden', !hasLess);
        }

        // 3. SHOW MORE — reveal next 2 rows
        function showMore() {
            visibleCount = Math.min(visibleCount + CARDS_PER_PAGE, allArticles.length);
            renderNews();
            // Scroll down slightly so user sees the new cards
            window.scrollBy({ top: 300, behavior: 'smooth' });
        }

        // 4. SHOW LESS — collapse back by 2 rows (min = initial page)
        function showLess() {
            visibleCount = Math.max(visibleCount - CARDS_PER_PAGE, CARDS_PER_PAGE);
            renderNews();
            // Scroll up a bit so user sees the top of the grid
            document.getElementById('news-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 5. SYNC NEWS
        async function syncData() {
            const btn = document.getElementById('sync-icon');
            btn.classList.add('fa-spin');
            await fetch('/sync-news');
            await loadNews();
            btn.classList.remove('fa-spin');
        }

        // 6. AI ASK LOGIC (RAG)
        async function askAI() {
            const queryInput = document.getElementById('ai-query');
            const responseBox = document.getElementById('ai-response-box');
            const answerText = document.getElementById('ai-answer-text');

            if (!queryInput.value) return;

            responseBox.classList.remove('hidden');
            answerText.innerHTML = `<span class="animate-pulse text-slate-500">Analyzing your feed with Mistral AI...</span>`;

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryInput.value })
                });

                const data = await response.json();
                answerText.classList.remove('italic');
                answerText.innerText = data.answer;
            } catch (error) {
                answerText.innerText = "Error: Make sure your Flask server and Ollama (Mistral) are running!";
            }
        }

        // Run on load
        loadNews();
    </script>
</body>
</html>
